{% extends "base.html" %} {% block title %}Reset Password{% endblock %} {% block
auth_content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🔒</div>
    <h4 class="text-center fw-bold mb-1">Set a new password</h4>
    <p class="text-center text-wp-muted mb-4" style="font-size: 13px">
      Choose a strong password for your account
    </p>
    {% if error %}
    <div class="alert alert-danger py-2 mb-3" style="font-size: 13px">
      {{ error }}
    </div>
    {% endif %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="mb-3">
        <label class="form-label">New Password</label>
        <div class="input-group">
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Enter Password"
            minlength="8"
            required
            autofocus
          />
          <button
            type="button"
            class="btn btn-outline-secondary"
            onclick="togglePassword('password', this)"
            tabindex="-1"
          >
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            class="form-control"
            placeholder="Confirm your password"
            required
          />
          <button
            type="button"
            class="btn btn-outline-secondary"
            onclick="togglePassword('confirm_password', this)"
            tabindex="-1"
          >
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-wp-primary w-100 py-2">
        Reset Password
      </button>
    </form>
  </div>
</div>

<script>
  function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const icon  = btn.querySelector('i');
    const isHidden = input.type === 'password';
    input.type     = isHidden ? 'text' : 'password';
    icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
  }
</script>

{% endblock %}
